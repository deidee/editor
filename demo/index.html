<!doctype html>
<html lang="nl">
<head>
    <meta charset="utf-8">
    <title>editor</title>
    <link rel="stylesheet" href="https://default.style/">

    <!-- Required Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>

    <!-- KaTeX -->
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/mhchem.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">

    <!-- ABC -->
    <script src="https://cdn.jsdelivr.net/combine/npm/tone@14.7.58,npm/abcjs@6.2.2/dist/abcjs-basic-min.js"></script>

    <style>
        .chem-block {
            margin: 1em 0;
            overflow-x: auto;
        }

        .mermaid-container,
        .abc-notation {
            margin: 1em 0;
        }

        .preview-container {
            line-height: 1.5;
        }
    </style>
</head>
<body id="top">

<textarea class="editor" style="width: 600px; height: 400px;">
# Welcome to the Rich Text Editor

## Markdown Support
- **Bold text**
- *Italic text*
- [Links](https://example.com)

## Math Support
Inline math: $E = mc^2$

Display math:
$$
\int_{-\infty}^{\infty} e^{-x^2} dx = \sqrt{\pi}
$$

## Diagram support
```mermaid
flowchart TD
    A[Start] --> B{Is it working?}
    B -->|Yes| C[Great!]
    B -->|No| D[Fix it]
    D --> B
```

## Chords support
```abc
X:1
T:ABC With Chords And Lyrics
M:4/4
L:1/4
Q:1/4=96
K:C
"C" C C E G | "F" A A G E | "G" G G B d | "C" c4 ||
w: La la sing a song to-day
```

## Chemistry support

Inline chemistry: $\ce{H2O}$ and $\ce{CO2 + C -> 2CO}$

Display chemistry:
$$
\ce{NH4+ + OH- -> NH3 + H2O}
$$

```chem
C6H12O6 + 6 O2 -> 6 CO2 + 6 H2O
```

```chem
H2SO4 + 2 NaOH -> Na2SO4 + 2 H2O
```
</textarea>

<script>
    class RichTextEditor {
        constructor() {
            this.editors = [];
            this.initMermaid();
            this.initMarked();
            this.init();
        }

        initMermaid() {
            mermaid.initialize({
                startOnLoad: false,
                theme: 'default',
                securityLevel: 'loose'
            });
        }

        initMarked() {
            marked.setOptions({
                breaks: true,
                gfm: true
            });
        }

        init() {
            const textareas = document.querySelectorAll('textarea.editor');
            textareas.forEach((textarea, index) => {
                this.createEditor(textarea, index);
            });
        }

        createEditor(textarea, index) {
            const computedStyle = window.getComputedStyle(textarea);
            const width = computedStyle.width;
            const height = computedStyle.height;

            const wrapper = document.createElement('div');
            wrapper.style.cssText = `
            width: ${width};
            height: ${height};
            border: 1px solid #ccc;
            position: relative;
            background: white;
        `;
            wrapper.className = 'rich-editor-wrapper';

            const tabContainer = document.createElement('div');
            tabContainer.style.cssText = `
            display: flex;
            border-bottom: 1px solid #ccc;
            background: #f5f5f5;
        `;

            const editTab = this.createTab('Edit', true);
            const previewTab = this.createTab('Preview', false);

            tabContainer.appendChild(editTab);
            tabContainer.appendChild(previewTab);

            const editContainer = document.createElement('div');
            editContainer.style.cssText = `
            width: 100%;
            height: calc(100% - 40px);
            display: block;
            position: relative;
        `;

            const previewContainer = document.createElement('div');
            previewContainer.style.cssText = `
            width: 100%;
            height: calc(100% - 40px);
            display: none;
            overflow: auto;
            padding: 10px;
            box-sizing: border-box;
        `;
            previewContainer.className = 'preview-container';

            const newTextarea = document.createElement('textarea');
            newTextarea.value = textarea.value;
            newTextarea.style.cssText = `
            width: 100%;
            height: 100%;
            border: none;
            padding: 10px;
            resize: none;
            outline: none;
            font-family: monospace;
            font-size: 14px;
            box-sizing: border-box;
        `;

            const editorData = {
                textarea: newTextarea,
                preview: previewContainer,
                editTab,
                previewTab,
                editContainer,
                originalTextarea: textarea,
                index
            };

            this.editors.push(editorData);

            editTab.addEventListener('click', () => this.switchToEdit(editorData));
            previewTab.addEventListener('click', () => this.switchToPreview(editorData));

            newTextarea.addEventListener('input', () => {
                textarea.value = newTextarea.value;
                textarea.dispatchEvent(new Event('change', { bubbles: true }));
            });

            editContainer.appendChild(newTextarea);
            wrapper.appendChild(tabContainer);
            wrapper.appendChild(editContainer);
            wrapper.appendChild(previewContainer);

            textarea.style.display = 'none';
            textarea.parentNode.insertBefore(wrapper, textarea.nextSibling);
        }

        createTab(text, active) {
            const tab = document.createElement('button');
            tab.textContent = text;
            tab.style.cssText = `
            padding: 8px 16px;
            border: none;
            background: ${active ? 'white' : 'transparent'};
            cursor: pointer;
            font-size: 14px;
            outline: none;
            border-bottom: ${active ? '2px solid #007bff' : 'none'};
        `;
            return tab;
        }

        switchToEdit(editorData) {
            editorData.editContainer.style.display = 'block';
            editorData.preview.style.display = 'none';
            editorData.editTab.style.background = 'white';
            editorData.editTab.style.borderBottom = '2px solid #007bff';
            editorData.previewTab.style.background = 'transparent';
            editorData.previewTab.style.borderBottom = 'none';
        }

        async switchToPreview(editorData) {
            editorData.editContainer.style.display = 'none';
            editorData.preview.style.display = 'block';
            editorData.editTab.style.background = 'transparent';
            editorData.editTab.style.borderBottom = 'none';
            editorData.previewTab.style.background = 'white';
            editorData.previewTab.style.borderBottom = '2px solid #007bff';

            await this.renderPreview(editorData);
        }

        async renderPreview(editorData) {
            let html = editorData.textarea.value;

            html = await this.processABC(html, editorData.index);
            html = await this.processMermaid(html, editorData.index);
            html = this.processChemBlocks(html, editorData.index);
            html = this.processMath(html);

            html = marked.parse(html);

            editorData.preview.innerHTML = html;

            this.renderABCElements(editorData.preview);
        }

        processMath(text) {
            text = text.replace(/\$\$([\s\S]*?)\$\$/g, (match, math) => {
                try {
                    return katex.renderToString(math.trim(), {
                        displayMode: true,
                        throwOnError: false
                    });
                } catch (e) {
                    return `<span style="color:red;">Math Error: ${this.escapeHtml(e.message)}</span>`;
                }
            });

            text = text.replace(/\$([^\$\n]+)\$/g, (match, math) => {
                try {
                    return katex.renderToString(math.trim(), {
                        displayMode: false,
                        throwOnError: false
                    });
                } catch (e) {
                    return `<span style="color:red;">Math Error: ${this.escapeHtml(e.message)}</span>`;
                }
            });

            return text;
        }

        processChemBlocks(text, editorIndex) {
            const chemRegex = /```chem\s*\n([\s\S]*?)```/g;
            const matches = [...text.matchAll(chemRegex)];

            for (let i = 0; i < matches.length; i++) {
                const match = matches[i];
                const chemCode = match[1].trim();

                try {
                    const rendered = katex.renderToString(`\\ce{${chemCode}}`, {
                        displayMode: true,
                        throwOnError: false
                    });
                    text = text.replace(match[0], `<div class="chem-block">${rendered}</div>`);
                } catch (e) {
                    text = text.replace(
                        match[0],
                        `<div style="color:red;">Chem Error: ${this.escapeHtml(e.message)}</div>`
                    );
                }
            }

            return text;
        }

        async processMermaid(text, editorIndex) {
            const mermaidRegex = /```mermaid\s*\n([\s\S]*?)```/g;
            const matches = [...text.matchAll(mermaidRegex)];

            for (let i = 0; i < matches.length; i++) {
                const match = matches[i];
                const mermaidCode = match[1];
                const id = `mermaid-${editorIndex}-${i}-${Date.now()}`;

                try {
                    const { svg } = await mermaid.render(id, mermaidCode);
                    text = text.replace(match[0], `<div class="mermaid-container">${svg}</div>`);
                } catch (e) {
                    text = text.replace(
                        match[0],
                        `<div style="color:red;">Mermaid Error: ${this.escapeHtml(e.message)}</div>`
                    );
                }
            }

            return text;
        }

        async processABC(text, editorIndex) {
            const abcRegex = /```abc\s*\n([\s\S]*?)```/g;
            const matches = [...text.matchAll(abcRegex)];

            for (let i = 0; i < matches.length; i++) {
                const match = matches[i];
                const abcCode = match[1];
                const id = `abc-${editorIndex}-${i}-${Date.now()}`;
                const encoded = this.encodeBase64Unicode(abcCode);

                text = text.replace(
                    match[0],
                    `<div class="abc-notation" id="${id}" data-abc="${encoded}"></div>`
                );
            }

            return text;
        }

        renderABCElements(container) {
            const abcElements = container.querySelectorAll('.abc-notation');

            abcElements.forEach((element) => {
                try {
                    const abcCode = this.decodeBase64Unicode(element.getAttribute('data-abc'));
                    ABCJS.renderAbc(element.id, abcCode, {
                        responsive: 'resize',
                        staffwidth: 500
                    });
                } catch (e) {
                    element.innerHTML = `<span style="color:red;">ABC Error: ${this.escapeHtml(e.message)}</span>`;
                }
            });
        }

        encodeBase64Unicode(str) {
            return btoa(unescape(encodeURIComponent(str)));
        }

        decodeBase64Unicode(str) {
            return decodeURIComponent(escape(atob(str)));
        }

        escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => new RichTextEditor());
    } else {
        new RichTextEditor();
    }
</script>
</body>
</html>
